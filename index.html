<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Etch-a-sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="header">
      <h1 id="title">Odin Etc-a-sketch</h1>
      <span id="user-input">
        <label for="grid-size"
          >Write the number for the new grid (e.g. 64 for a 64x64 grid)</label
        >
        <input
          type="number"
          id="grid-size"
          name="grid-size"
          min="1"
          max="100"
        />
        <button id="create-grid">New grid</button>
      </span>
    </div>
    <div id="grid"></div>
  </body>
</html>
